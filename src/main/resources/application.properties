spring.application.name=tiendaMia
server.servlet.context-path=/tiendaMia
server.port=8089
#PostgresSQl
spring.datasource.url=jdbc:postgresql://localhost:5432/tienda_mia_db
spring.datasource.username=andrewchiroque
spring.datasource.password=""
spring.datasource.driver-class-name=org.postgresql.Driver

#creaccion
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=create


#loggs para ver que hace JPA
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=always

# Esto evita que Java guarde el HTML viejo en memoria
spring.thymeleaf.cache=false
# Esto le dice a Java que lea los archivos directo de la carpeta de trabajo
spring.web.resources.static-locations=file:src/main/resources/static/

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body class="container">
    <nav class="nav mb-5 mt-4">
      <a href="./index.html" class="nav-link">Inicio</a>
      <a href="./clientes.html" class="nav-link">Clientes</a>
      <a href="./categorias.html" class="nav-link">Categorias</a>
      <a href="./productos.html" class="nav-link">Productos</a>
    </nav>

    <main>
      <div class="w-25">
        <h4>Tienda Mia</h4>
        <form action="" id="form" class="form">
          <div class="mb-3">
            <label>Categorias:</label>
            <select
              name="categorias"
              id="opcionesCategorias"
              class="form-select"
            ></select>
          </div>

          <div class="mb-3">
            <label for="">Productos:</label>
            <select
              name="productos"
              id="opcionesProductos"
              class="form-select"
            ></select>
          </div>

          <div class="mb-3">
            <label for="">Precio:</label>
            <input
              type="text"
              placeholder="00"
              id="precioProducto"
              class="form-control"
            />
          </div>

          <div class="mb-3">
            <label for="">Cantidad:</label>
            <input
              type="text"
              class="form-control"
              inputmode="numeric"
              placeholder="cantidad"
              pattern="[0-9]*"
              id="cantidadCompra"
            />
          </div>
          <input
            type="button"
            value="Enviar"
            class="btn btn-primary pe-4 ps-4"
          />
        </form>
      </div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>

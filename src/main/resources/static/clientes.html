<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="container">
    <nav class="nav mb-4">
      <a href="./index.html" class="nav-link">Inicio</a>
      <a href="./clientes.html" class="nav-link">Clientes</a>
      <a href="./categorias.html" class="nav-link">Categorias</a>
      <a href="./productos.html" class="nav-link">Productos</a>
    </nav>

    <div class="containerClientes">
      <div class="w-25 mb-5">
        <h5 class="text-primary">Nuevo cliente</h5>
        <form action="POST" id="formCliente">
          <div class="mb-3">
            <label for="">Nombre: </label>
            <input type="text" placeholder="Luis" class="form-control" required id="inputNombre"/>
          </div>
          <div class="mb-3">
            <label for="">Apellido: </label>
            <input type="text" placeholder="Ferreiro" class="form-control" id="inputApellido"/>
          </div>
          <div class="mb-3">
            <label for="">Dni: </label>
            <input type="text" placeholder="12345678" class="form-control" id="inputDni"/>
          </div>

          <div class="mb-3">
            <label for="">Telefono: </label>
            <input type="text" placeholder="987654321" class="form-control" id="inputTelefono"/>
          </div>
          <input
            type="button"
            value="Enviar"
            class="btn btn-primary pe-4 ps-4"
            onclick="registrarCliente()"
          />
        </form>
      </div>

      <div>
        <h5 class="text-primary">Clientes registrados</h5>
        <table class="table table-bordered">
          <thead id="thClientes" class="table-dark text-center"></thead>
          <tbody id="tbClientes"></tbody>
        </table>
      </div>
    </div>
    <script src="./js/resgitrosAndLis.js"></script>
  </body>
</html>
